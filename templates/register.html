{% extends "base.html" %}
{% set active_page = 'register' %}

{% block title %}Register — Smart Library{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-4 mb-5">
  <div class="col-12 col-md-8 col-lg-5">
    
    <div class="card form-card shadow-lg border-0 animate__animated animate__fadeInUp">
      <div class="card-body p-4 p-md-5">
        
        <div class="text-center mb-4">
          <i class="bi bi-person-plus-fill display-4 text-primary mb-3"></i>
          <h3 class="fw-bold mb-1" style="color:var(--primary)">Create Account</h3>
          <p class="text-muted">Join Smart Library to borrow and track your books</p>
        </div>

        <!-- Start Form -->
        <form id="registerForm" method="POST" action="{{ url_for('register') }}" novalidate>
          
          <!-- Full Name -->
          <div class="mb-4 position-relative">
            <label for="regName" class="form-label fw-semibold text-primary">Full Name</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control border-start-0 ps-0" id="regName" name="name" placeholder="E.g. John Doe" required>
            </div>
            <div class="invalid-feedback position-absolute w-100 mt-1"></div>
          </div>

          <!-- Email -->
          <div class="mb-4 position-relative mt-2">
            <label for="regEmail" class="form-label fw-semibold text-primary">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control border-start-0 ps-0" id="regEmail" name="email" placeholder="you@example.com" required>
            </div>
            <div class="invalid-feedback position-absolute w-100 mt-1"></div>
          </div>

          <!-- Phone Number -->
          <div class="mb-4 position-relative mt-2">
            <label for="regPhone" class="form-label fw-semibold text-primary">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-telephone"></i></span>
              <input type="tel" class="form-control border-start-0 ps-0" id="regPhone" name="phone" placeholder="10-digit number" required>
            </div>
            <div class="invalid-feedback position-absolute w-100 mt-1"></div>
          </div>

          <!-- Password -->
          <div class="mb-4 position-relative mt-2">
            <label for="regPassword" class="form-label fw-semibold text-primary">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control border-start-0 ps-0" id="regPassword" name="password" placeholder="Min. 8 characters" required>
            </div>
            <!-- Password Strength Indicator -->
            <div class="progress mt-2" style="height: 6px; display: none;" id="pwStrengthContainer">
              <div id="pwStrengthBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <small id="pwStrengthText" class="text-muted mt-1 d-block" style="display: none;"></small>
            
            <div class="invalid-feedback position-absolute w-100 mt-1" style="bottom: -22px;"></div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary-custom w-100 py-3 mt-4 mb-3 fw-bold rounded-3 shadow-sm">
            Register <i class="bi bi-person-check ms-1"></i>
          </button>
          
        </form>

        <div class="text-center mt-3">
          <p class="text-muted mb-0">Already have an account? 
            <a href="{{ url_for('login') }}" class="text-accent fw-bold text-decoration-none ms-1">Sign in</a>
          </p>
        </div>

      </div>
    </div>

  </div>
</div>
{% endblock %}
