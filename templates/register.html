{% extends "base.html" %}
{% set active_page = 'register' %}

{% block title %}Register — LibraHub{% endblock %}

{% block content %}
<div class="container">
  <div class="card form-card shadow">

    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill" style="font-size:3rem;color:var(--primary)"></i>
        <h3 class="mt-2" style="font-weight:700;color:var(--primary)">Create Account</h3>
        <p class="text-muted">Join LibraHub and start exploring thousands of books</p>
      </div>

      <form id="registerForm" method="POST" action="{{ url_for('register') }}" novalidate>
        <!-- Full Name -->
        <div class="mb-3">
          <label for="regName" class="form-label">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="regName" name="name"
                   placeholder="John Doe" required>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="regEmail" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="regEmail" name="email"
                   placeholder="you@example.com" required>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="regPassword" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="regPassword" name="password"
                   placeholder="Min. 6 characters" required>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-4">
          <label for="regConfirm" class="form-label">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" class="form-control" id="regConfirm" name="confirm_password"
                   placeholder="Re-enter password" required>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <!-- Terms -->
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="agreeTerms" name="agree" required>
          <label class="form-check-label" for="agreeTerms">
            I agree to the <a href="#" class="text-accent" style="text-decoration:none">Terms &amp; Conditions</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary-custom w-100 py-2">
          <i class="bi bi-person-check me-1"></i>Create Account
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Already have an account? <a href="{{ url_for('login') }}" class="text-accent fw-semibold" style="text-decoration:none">Sign in</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
