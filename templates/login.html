{% extends "base.html" %}
{% set active_page = 'login' %}

{% block title %}Login — Smart Library{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center h-100 mt-5">
  <div class="col-12 col-md-8 col-lg-5">
    
    <div class="card form-card shadow-lg border-0 animate__animated animate__fadeInUp">
      <div class="card-body p-4 p-md-5">
        
        <div class="text-center mb-4">
          <i class="bi bi-person-circle display-4 text-primary mb-3"></i>
          <h3 class="fw-bold mb-1" style="color:var(--primary)">Welcome Back</h3>
          <p class="text-muted">Sign in to access your library account</p>
        </div>

        <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>
          
          <!-- Email Field -->
          <div class="form-floating mb-4 position-relative">
            <input type="email" class="form-control" id="loginEmail" name="email" placeholder="name@example.com" required>
            <label for="loginEmail"><i class="bi bi-envelope me-2"></i>Email address</label>
            <div class="invalid-feedback position-absolute w-100 text-start mt-1"></div>
          </div>

          <!-- Password Field -->
          <div class="form-floating mb-4 position-relative">
            <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Password" required>
            <label for="loginPassword"><i class="bi bi-lock me-2"></i>Password</label>
            <div class="invalid-feedback position-absolute w-100 text-start mt-1"></div>
          </div>

          <!-- Remember Me + Forgot Password -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
              <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="small text-accent fw-medium text-decoration-none">Forgot password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3 fw-bold rounded-3 shadow-sm">
            Sign In <i class="bi bi-box-arrow-in-right ms-1"></i>
          </button>
          
        </form>

        <div class="text-center mt-4">
          <p class="text-muted mb-0">Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-accent fw-bold text-decoration-none ms-1">Create one</a>
          </p>
        </div>

      </div>
    </div>

  </div>
</div>
{% endblock %}
