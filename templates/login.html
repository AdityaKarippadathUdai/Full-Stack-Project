{% extends "base.html" %}
{% set active_page = 'login' %}

{% block title %}Login — LibraHub{% endblock %}

{% block content %}
<div class="container">
  <div class="card form-card shadow">

    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <i class="bi bi-person-circle" style="font-size:3rem;color:var(--primary)"></i>
        <h3 class="mt-2" style="font-weight:700;color:var(--primary)">Welcome Back</h3>
        <p class="text-muted">Sign in to access your library account</p>
      </div>

      <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>
        <!-- Email -->
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail" name="email"
                   placeholder="you@example.com" required>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="loginPassword" name="password"
                   placeholder="••••••••" required>
          </div>
          <div class="invalid-feedback"></div>
        </div>

        <!-- Remember + Forgot -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
            <label class="form-check-label" for="rememberMe">Remember me</label>
          </div>
          <a href="#" class="small text-accent" style="text-decoration:none">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary-custom w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted mb-0">
        Don't have an account? <a href="{{ url_for('register') }}" class="text-accent fw-semibold" style="text-decoration:none">Create one</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
